    <path d="M276 419 L394 633" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M166 274 L865 604" stroke="#94A3B8" stroke-width="2" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
  </g>

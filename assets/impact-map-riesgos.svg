<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#F7FAF7"/>
  <text x="48" y="54" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#153D34">ParkLink - Impact Mapping con riesgos</text>
  <text x="48" y="82" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#47635C">Gestión y reserva de estacionamientos para conductores y empresarios/propietarios</text>

  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="42" y="122" width="238" height="470" rx="12" fill="#DDEFE8" stroke="#3E7A67" stroke-width="2"/>
    <text x="62" y="158" font-size="20" font-weight="700" fill="#153D34">Business Goals</text>
    <rect x="62" y="184" width="198" height="92" rx="8" fill="#FFFFFF" stroke="#82AF9D"/>
    <text x="78" y="211" font-size="14" font-weight="700" fill="#153D34">BG1</text>
    <text x="78" y="236" font-size="13" fill="#243B36">500 conductores activos</text>
    <text x="78" y="255" font-size="13" fill="#243B36">con una reserva en 6 meses</text>
    <rect x="62" y="302" width="198" height="92" rx="8" fill="#FFFFFF" stroke="#82AF9D"/>
    <text x="78" y="329" font-size="14" font-weight="700" fill="#153D34">BG2</text>
    <text x="78" y="354" font-size="13" fill="#243B36">100 empresarios publican</text>
    <text x="78" y="373" font-size="13" fill="#243B36">al menos un espacio activo</text>
    <rect x="62" y="420" width="198" height="112" rx="8" fill="#FFFFFF" stroke="#82AF9D"/>
    <text x="78" y="447" font-size="14" font-weight="700" fill="#153D34">BG3</text>
    <text x="78" y="472" font-size="13" fill="#243B36">70% de búsquedas con</text>
    <text x="78" y="491" font-size="13" fill="#243B36">recomendación de tarifa</text>
    <text x="78" y="510" font-size="13" fill="#243B36">y 40% de adopción</text>

    <rect x="324" y="122" width="216" height="470" rx="12" fill="#E8EEF8" stroke="#4B6FA8" stroke-width="2"/>
    <text x="344" y="158" font-size="20" font-weight="700" fill="#1F355A">Actores</text>
    <rect x="344" y="190" width="176" height="86" rx="8" fill="#FFFFFF" stroke="#8BA4D0"/>
    <text x="362" y="222" font-size="15" font-weight="700" fill="#1F355A">Conductor urbano</text>
    <text x="362" y="246" font-size="13" fill="#2C3D57">Busca, compara, reserva</text>
    <rect x="344" y="318" width="176" height="86" rx="8" fill="#FFFFFF" stroke="#8BA4D0"/>
    <text x="362" y="350" font-size="15" font-weight="700" fill="#1F355A">Empresario</text>
    <text x="362" y="374" font-size="13" fill="#2C3D57">Publica y gestiona espacios</text>
    <rect x="344" y="446" width="176" height="86" rx="8" fill="#FFFFFF" stroke="#8BA4D0"/>
    <text x="362" y="478" font-size="15" font-weight="700" fill="#1F355A">ParkTeam</text>
    <text x="362" y="502" font-size="13" fill="#2C3D57">Mide conversión y riesgos</text>

    <rect x="584" y="122" width="278" height="470" rx="12" fill="#FFF3D9" stroke="#C28A2A" stroke-width="2"/>
    <text x="604" y="158" font-size="20" font-weight="700" fill="#624315">Impactos y entregables</text>
    <rect x="604" y="184" width="238" height="78" rx="8" fill="#FFFFFF" stroke="#D9A94B"/>
    <text x="622" y="212" font-size="14" font-weight="700" fill="#624315">Búsqueda confiable</text>
    <text x="622" y="235" font-size="13" fill="#5C4A2B">Mapa, disponibilidad y detalle</text>
    <rect x="604" y="284" width="238" height="78" rx="8" fill="#FFFFFF" stroke="#D9A94B"/>
    <text x="622" y="312" font-size="14" font-weight="700" fill="#624315">Reserva y pago</text>
    <text x="622" y="335" font-size="13" fill="#5C4A2B">Bloqueo, confirmación y comprobante</text>
    <rect x="604" y="384" width="238" height="78" rx="8" fill="#FFFFFF" stroke="#D9A94B"/>
    <text x="622" y="412" font-size="14" font-weight="700" fill="#624315">Gestión de espacios</text>
    <text x="622" y="435" font-size="13" fill="#5C4A2B">Horarios, tarifas, reservas e ingresos</text>
    <rect x="604" y="484" width="238" height="78" rx="8" fill="#FFFFFF" stroke="#D9A94B"/>
    <text x="622" y="512" font-size="14" font-weight="700" fill="#624315">Recomendación de tarifa</text>
    <text x="622" y="535" font-size="13" fill="#5C4A2B">Costo total, distancia y disponibilidad</text>

    <rect x="906" y="122" width="246" height="470" rx="12" fill="#FCE5E1" stroke="#B55A50" stroke-width="2"/>
    <text x="926" y="158" font-size="20" font-weight="700" fill="#6B2822">Riesgos principales</text>
    <rect x="926" y="184" width="206" height="64" rx="8" fill="#FFFFFF" stroke="#CB817A"/>
    <text x="944" y="212" font-size="13" font-weight="700" fill="#6B2822">Doble reserva</text>
    <text x="944" y="232" font-size="12" fill="#5C312D">Mitigar con TS01 y bloqueos</text>
    <rect x="926" y="268" width="206" height="64" rx="8" fill="#FFFFFF" stroke="#CB817A"/>
    <text x="944" y="296" font-size="13" font-weight="700" fill="#6B2822">Fallas de pago</text>
    <text x="944" y="316" font-size="12" fill="#5C312D">Webhooks idempotentes TS06</text>
    <rect x="926" y="352" width="206" height="64" rx="8" fill="#FFFFFF" stroke="#CB817A"/>
    <text x="944" y="380" font-size="13" font-weight="700" fill="#6B2822">Baja oferta inicial</text>
    <text x="944" y="400" font-size="12" fill="#5C312D">Onboarding y métricas por zona</text>
    <rect x="926" y="436" width="206" height="64" rx="8" fill="#FFFFFF" stroke="#CB817A"/>
    <text x="944" y="464" font-size="13" font-weight="700" fill="#6B2822">Privacidad de fotos</text>
    <text x="944" y="484" font-size="12" fill="#5C312D">S3 privado y URLs firmadas</text>
    <rect x="926" y="520" width="206" height="64" rx="8" fill="#FFFFFF" stroke="#CB817A"/>
    <text x="944" y="548" font-size="13" font-weight="700" fill="#6B2822">Dependencia externa</text>
    <text x="944" y="568" font-size="12" fill="#5C312D">Adaptadores y observabilidad</text>

    <path d="M280 356 L324 356" stroke="#65736F" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M540 356 L584 356" stroke="#65736F" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M862 356 L906 356" stroke="#65736F" stroke-width="3" marker-end="url(#arrow)"/>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#65736F"/>
    </marker>
  </defs>
</svg>
